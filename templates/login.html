{% extends "base.html" %}
{% block title %}تسجيل الدخول — SmartLab{% endblock %}
{% block content %}
<div class="card card-narrow">
  <h1>تسجيل الدخول</h1>
  <p class="lede">سجّل الدخول لعرض سجلّك الطبي المحفوظ.</p>
  <form method="POST">
    <label for="email">البريد الإلكتروني</label>
    <input type="email" id="email" name="email" required>

    <label for="password">كلمة المرور</label>
    <input type="password" id="password" name="password" required>

    <button class="btn" type="submit" style="width:100%; justify-content:center;">دخول</button>
  </form>
  <p class="form-footer">
    ليس لديك حساب؟ <a href="{{ url_for('register') }}" style="color:var(--teal-deep); font-weight:600;">أنشئ حسابًا</a>
    — أو <a href="{{ url_for('guest') }}" style="color:var(--teal-deep); font-weight:600;">تابع كزائر</a>
  </p>
</div>
{% endblock %}
