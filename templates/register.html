{% extends "base.html" %}
{% block title %}إنشاء حساب — SmartLab{% endblock %}
{% block content %}
<div class="card card-narrow">
  <h1>إنشاء حساب</h1>
  <p class="lede">أنشئ حسابًا لحفظ تقاريرك ومتابعة تغيّرها عبر الوقت.</p>
  <form method="POST">
    <label for="name">الاسم</label>
    <input type="text" id="name" name="name" required>

    <label for="email">البريد الإلكتروني</label>
    <input type="email" id="email" name="email" required>

    <label for="password">كلمة المرور</label>
    <input type="password" id="password" name="password" required minlength="6">

    <button class="btn" type="submit" style="width:100%; justify-content:center;">إنشاء الحساب</button>
  </form>
  <p class="form-footer">
    لديك حساب؟ <a href="{{ url_for('login') }}" style="color:var(--teal-deep); font-weight:600;">سجّل الدخول</a>
  </p>
</div>
{% endblock %}
